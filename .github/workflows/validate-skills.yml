name: Validate Skills

on:
  push:
    paths:
      - 'skills/**/SKILL.md'
      - 'skills/**/*.py'
      - '.claude/skills/**/SKILL.md'
      - 'scripts/**'
      - 'tests/**'
      - '.claude/rules/**'
      - 'package.json'
      - 'pyproject.toml'
      - '.claude-plugin/plugin.json'
      - '.claude-plugin/marketplace.json'
      - '.release-please-manifest.json'
  pull_request:
    paths:
      - 'skills/**/SKILL.md'
      - 'skills/**/*.py'
      - '.claude/skills/**/SKILL.md'
      - 'scripts/**'
      - 'tests/**'
      - '.claude/rules/**'
      - 'package.json'
      - 'pyproject.toml'
      - '.claude-plugin/plugin.json'
      - '.claude-plugin/marketplace.json'
      - '.release-please-manifest.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Validate all SKILL.md files
        run: |
          uv run --quiet scripts/validate-skill.py
          uv run --quiet scripts/validate-skill.py .claude/skills/*/SKILL.md

      - name: Validate rules files
        run: uv run --quiet scripts/validate-rules.py

      - name: Check version sync
        run: uv run --quiet scripts/check-version-sync.py

      - name: Run tests
        run: uv run --with pytest pytest tests/

      - name: Lint scripts
        run: uv run --with ruff ruff check scripts/ tests/ skills/

      - name: Check script formatting
        run: uv run --with ruff ruff format --check scripts/ tests/ skills/
