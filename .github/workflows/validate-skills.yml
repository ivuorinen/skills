name: Validate Skills

on:
  push:
    paths:
      - 'skills/**/SKILL.md'
      - '.claude/skills/**/SKILL.md'
      - 'scripts/validate-skill.py'
      - 'scripts/validate-rules.py'
      - 'scripts/check-version-sync.py'
      - 'scripts/common.py'
      - 'tests/**'
      - '.claude/rules/**'
      - 'package.json'
      - 'pyproject.toml'
      - '.claude-plugin/plugin.json'
      - '.claude-plugin/marketplace.json'
      - '.release-please-manifest.json'
  pull_request:
    paths:
      - 'skills/**/SKILL.md'
      - '.claude/skills/**/SKILL.md'
      - 'scripts/validate-skill.py'
      - 'scripts/validate-rules.py'
      - 'scripts/check-version-sync.py'
      - 'scripts/common.py'
      - 'tests/**'
      - '.claude/rules/**'
      - 'package.json'
      - 'pyproject.toml'
      - '.claude-plugin/plugin.json'
      - '.claude-plugin/marketplace.json'
      - '.release-please-manifest.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Validate all SKILL.md files
        run: |
          uv run scripts/validate-skill.py
          uv run scripts/validate-skill.py .claude/skills/*/SKILL.md

      - name: Validate rules files
        run: uv run scripts/validate-rules.py

      - name: Check version sync
        run: uv run scripts/check-version-sync.py

      - name: Run tests
        run: uv run --with pytest pytest tests/
