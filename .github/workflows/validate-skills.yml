# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Validate Skills

on:
  push:
    branches:
      - main
  pull_request:
    # No `edited`: this workflow carries the required Validate check, and a job
    # skipped by an `if:` reports as success to branch protection — so a title
    # edit could satisfy the gate for a failing commit. Title linting lives in
    # pr-title.yml, which owns the `edited` event. `reopened` keeps the required
    # check from going stale when a PR is reopened with no new commits.
    types: [opened, reopened, synchronize]
  # Manual trigger so Validate can be run on the release-please branch, which
  # GITHUB_TOKEN-authored PRs cannot auto-trigger (see release-please.yml).
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-lint:
    name: Lint commit messages
    # The pre-commit `conventional-commit-msg` hook runs at the commit-msg stage,
    # which `pre-commit run --all-files` never executes — so without this job CI
    # validates only the PR title, and that is a complete gate only under
    # squash-merge. release-please silently ignores unparseable commits.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read # read-only: reads the PR commit range to lint subjects
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # full history: the base..head range must be walkable
          persist-credentials: false

      - name: Validate commit subjects
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        # The regex is read out of .pre-commit-config.yaml at runtime rather than
        # copied, so this gate and the commit-msg hook cannot drift apart.
        run: |
          python3 - <<'PY'
          import os, re, subprocess, sys

          config = open(".pre-commit-config.yaml").read()
          m = re.search(
              r"id: conventional-commit-msg[\s\S]*?^\s*entry: '([^']+)'$", config, re.M
          )
          if not m:
              sys.exit("could not read conventional-commit-msg regex from .pre-commit-config.yaml")
          pattern = re.compile(m.group(1))

          subjects = subprocess.run(
              ["git", "log", "--format=%s", f"{os.environ['BASE_SHA']}..{os.environ['HEAD_SHA']}"],
              check=True, capture_output=True, text=True,
          ).stdout.splitlines()

          bad = [s for s in subjects if not pattern.search(s)]
          for s in bad:
              print(f"::error::non-conventional commit subject: {s}")
          print(f"checked {len(subjects)} commit(s), {len(bad)} invalid")
          sys.exit(1 if bad else 0)
          PY

  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read # read-only: only reads the checkout to validate it
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Validate all SKILL.md files
        run: |
          uv run --quiet scripts/validate-skill.py
          uv run --quiet scripts/validate-skill.py .claude/skills/*/SKILL.md

      - name: Validate rules files
        run: uv run --quiet scripts/validate-rules.py

      - name: Check version sync
        run: uv run --quiet scripts/check-version-sync.py

      - name: Validate findings store
        run: python3 skills/nitpicker/scripts/findings.py validate

      - name: Check findings index is current
        run: |
          python3 skills/nitpicker/scripts/findings.py index
          git diff --exit-code docs/audit/findings/INDEX.md

      - name: Run tests
        run: uv run --extra dev pytest tests/

      - name: Lint scripts
        run: uv run --extra dev ruff check scripts/ tests/ skills/

      - name: Type-check
        # Zero floor: any pyright error fails the gate. A count threshold could
        # mask a new error by fixing an old one, so the tolerated set stays empty.
        # Mirrors the `typecheck` target in the Makefile — change both together.
        run: |
          uv run --with pyright==1.1.411 pyright --outputjson \
            | python3 -c "import json,sys; n=json.load(sys.stdin)['summary']['errorCount']; print(f'pyright: {n} error(s)'); sys.exit(n != 0)"

      - name: Check script formatting
        run: uv run --with ruff==0.15.21 ruff format --check scripts/ tests/ skills/

      - name: Run pre-commit suite
        run: uv run --with pre-commit==4.6.0 pre-commit run --all-files --show-diff-on-failure
