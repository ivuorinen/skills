# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: PR Title

# Lives in its own workflow because it is the only job that needs the `edited`
# event. Keeping it here means the Validate workflow never produces a
# conditionally-skipped run under a required check name — GitHub reports a
# skipped job as success to required-status-check evaluation, so a title edit
# would otherwise satisfy branch protection for a failing commit.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read # read-only: the action only reads the PR title to lint it
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
