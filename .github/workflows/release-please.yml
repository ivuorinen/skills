# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Release Please

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write # create release commits, tags, and GitHub releases
      pull-requests: write # open and update the release PR
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # Prefer a PAT/App token so the release PR triggers CI (GITHUB_TOKEN
          # cannot — GitHub's recursion guard). Falls back to GITHUB_TOKEN when
          # RELEASE_PLEASE_TOKEN is unset; then run Validate via workflow_dispatch.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
